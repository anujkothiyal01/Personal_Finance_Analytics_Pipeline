version: 2

models:
  - name: dim_date
    columns:
      - name: date_key
        tests:
          - not_null
          - unique

  - name: dim_category
    columns:
      - name: category_key
        tests:
          - not_null
          - unique

  - name: dim_merchant
    columns:
      - name: merchant_key
        tests:
          - not_null
          - unique

  - name: dim_payment_mode
    columns:
      - name: payment_mode_key
        tests:
          - not_null
          - unique

  - name: fct_transactions
    columns:
      - name: transaction_key
        tests:
          - not_null
          - unique
      - name: txn_id
        tests:
          - not_null
          - unique
      - name: date_key
        tests:
          - not_null
          - relationships:
              to: ref('dim_date')
              field: date_key

  - name: mart_monthly_cashflow

  - name: mart_category_spend

  - name: mart_savings_kpis